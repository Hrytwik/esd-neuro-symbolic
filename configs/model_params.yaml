# ============================================================
# Statistical Reference System Hyperparameter Configuration
# Applies to: BiopsyAssistedReferenceSystem (Model A),
#             ClinicalOnlyInferenceBaseline (Model B),
#             StatisticalRefinementAdjunct (Model C hybrid)
# ============================================================

xgboost:
  param_grid:
    n_estimators: [100, 200, 300]
    max_depth: [3, 5, 7]
    learning_rate: [0.1, 0.05]
    subsample: [0.8, 1.0]
    colsample_bytree: [0.8, 1.0]
  fixed_params:
    objective: "multi:softprob"
    num_class: 6
    eval_metric: "mlogloss"
    random_state: 42
    n_jobs: -1

symbolic_engine:
  fuzzy_grading:
    ordinal_grades:
      0: 0.00
      1: 0.33
      2: 0.67
      3: 1.00
  rule_activation:
    min_partial_activation: 0.10
    dormant_threshold: 0.05
  certainty:
    softmax_temperature: 1.0  # standard softmax
  state_machine:
    min_rules_for_s1: 2
    min_rules_per_disease_for_s2: 3
    contradiction_emergence_threshold: 0.20
    certainty_gap_for_s6: 0.20
    certainty_for_s6: 0.55
    certainty_gap_for_s7: 0.35
    certainty_for_s7: 0.65

random_state: 42
